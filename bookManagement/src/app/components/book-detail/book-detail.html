<div id="details">
  <div *ngIf="selectedBook; else loading">
    <header class="d-flex justify-content-between mb-3">
      <a class="nav-link" 
        [routerLink]="['/allBooks']"
        > ← Back to the list
      </a>
      <h2 class="mb-4 text-center">{{ selectedBook.title }}</h2>
    </header>
    <div class="d-flex gap-5 mb-4">
      <div>
        <p><strong>Author:</strong> {{ selectedBook.author }}</p>
        <p><strong>Description:</strong> {{ selectedBook.description }}</p>
        <p><strong>Genre:</strong> {{ selectedBook.genre }}</p>
        <p><strong>Year:</strong> {{ selectedBook.year }}</p>
      </div>
      <img [src]="selectedBook.image" style="width: 130px; height: auto;">
    </div>
    <div id="buttons" class="mt-4">
      <button class="btn btn-primary ms-4">Update Details</button>
        <a class="btn btn-danger ms-4" 
          [routerLink]="['/allBooks']"
          [routerLinkActive]="'active'"
          (click)="deleteBook()"
          >Remove Book
        </a>

    </div>
  </div>

  <ng-template #loading>
    <p class="mb-5">Loading book details...</p>
  </ng-template>
</div>
